services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lpagent
      POSTGRES_PASSWORD: lpagent
      POSTGRES_DB: lpagent_discord
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lpagent -d lpagent_discord"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
